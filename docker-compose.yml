services:
  canvas-a11y:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    environment:
      - CA11Y_CANVAS_BASE_URL=${CA11Y_CANVAS_BASE_URL:-https://canvas.yourschool.edu}
      - CA11Y_CANVAS_API_TOKEN=${CA11Y_CANVAS_API_TOKEN:-}
      - CA11Y_AI_PROVIDER=${CA11Y_AI_PROVIDER:-}
      - CA11Y_AI_API_KEY=${CA11Y_AI_API_KEY:-}
      - CA11Y_AI_MODEL=${CA11Y_AI_MODEL:-}
    restart: unless-stopped
