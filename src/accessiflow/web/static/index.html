<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessiflow — Accessibility Auditor for Canvas LMS</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        /* ── Base ──────────────────────────────────────────────── */
        :root {
            --pass: #0d7a32; --pass-bg: #dcfce7;
            --warn: #7c5a02; --warn-bg: #fef9c3;
            --fail: #dc2626; --fail-bg: #fee2e2;
            --primary: #2563eb;
            --bg: #f5f6fa;
            --card: #fff;
            --text: #1a1a2e;
            --muted: #596678;
            --border: #e2e8f0;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }

        /* ── Card ──────────────────────────────────────────────── */
        .card {
            background: var(--card);
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }

        /* ── Wizard steps bar ──────────────────────────────────── */
        .steps { display: flex; gap: .5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .step-pill {
            padding: .35rem 1rem; border-radius: 999px;
            font-size: .82rem; font-weight: 600;
            background: var(--border); color: var(--muted);
            cursor: default; transition: all .2s;
        }
        .step-pill.active { background: var(--primary); color: #fff; }
        .step-pill.done { background: var(--pass-bg); color: var(--pass); }

        /* ── Forms ─────────────────────────────────────────────── */
        label { display: block; font-weight: 600; margin-bottom: .25rem; font-size: .9rem; }
        input[type="text"], input[type="password"], input[type="url"], input[type="search"], input[type="email"] {
            width: 100%; padding: .6rem .75rem; border: 1px solid var(--border);
            border-radius: 6px; font-size: .95rem; margin-bottom: 1rem;
            transition: border-color .15s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
        select {
            width: 100%; padding: .6rem .75rem; border: 1px solid var(--border);
            border-radius: 6px; font-size: .95rem; margin-bottom: 1rem; background: #fff;
        }

        /* ── Buttons ───────────────────────────────────────────── */
        .btn {
            display: inline-flex; align-items: center; gap: .4rem;
            padding: .6rem 1.25rem; border: none; border-radius: 6px;
            font-weight: 600; font-size: .9rem; cursor: pointer; transition: all .15s;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #6b9fd6; color: #fff; cursor: not-allowed; }
        .btn-success { background: var(--pass); color: #fff; }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: var(--fail); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--bg); }
        .btn-sm { padding: .3rem .75rem; font-size: .8rem; }
        .btn-ghost { background: transparent; border: none; color: var(--muted); padding: .3rem .5rem; }
        .btn-ghost:hover { color: var(--text); }

        /* ── Score gauge ───────────────────────────────────────── */
        .score-gauge {
            width: 160px; height: 160px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; font-weight: 700; flex-shrink: 0;
            border: 6px solid currentColor;
        }
        .score-gauge .val { font-size: 2.5rem; line-height: 1; }
        .score-gauge .lbl { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; }
        .sc-pass { color: var(--pass); }
        .sc-warn { color: var(--warn); }
        .sc-fail { color: var(--fail); }

        /* ── Severity badges ───────────────────────────────────── */
        .sev {
            display: inline-flex; align-items: center; gap: .3em;
            padding: .15em .6em; border-radius: 4px;
            font-size: .78rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .03em; white-space: nowrap;
        }
        .sev-critical { background: #fee2e2; color: #991b1b; }
        .sev-serious  { background: #fed7aa; color: #9a3412; }
        .sev-moderate  { background: #fef9c3; color: #854d0e; }
        .sev-minor     { background: #f3f4f6; color: #4b5563; }

        /* ── Role badges ───────────────────────────────────────── */
        .role-badge { padding: .15em .5em; border-radius: 4px; font-size: .75rem; font-weight: 600; text-transform: uppercase; }
        .role-admin { background: #ede9fe; color: #6d28d9; }
        .role-auditor { background: #dbeafe; color: #1d4ed8; }
        .role-viewer { background: #f3f4f6; color: #4b5563; }

        /* ── Stats grid ────────────────────────────────────────── */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: .75rem; margin-top: 1rem;
        }
        .stat-box {
            text-align: center; padding: .75rem; border-radius: 6px;
            background: #f8fafc; border: 1px solid var(--border);
        }
        .stat-box .sv { font-size: 1.75rem; font-weight: 700; }
        .stat-box .sl { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

        /* ── Tables ────────────────────────────────────────────── */
        .tbl { width: 100%; border-collapse: collapse; font-size: .88rem; }
        .tbl thead th {
            text-align: left; padding: .55rem .75rem; background: #f8fafc;
            border-bottom: 2px solid var(--border); font-weight: 600;
            font-size: .78rem; text-transform: uppercase; letter-spacing: .03em; color: #475569;
        }
        .tbl tbody td { padding: .5rem .75rem; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .tbl tbody tr:hover { background: #f8fafc; }
        .tr { text-align: right; }
        .tc { text-align: center; }
        .mono { font-family: "SF Mono","Fira Code",Consolas,monospace; font-size: .82rem; }
        .score-pill { display: inline-block; padding: .1em .5em; border-radius: 4px; font-weight: 600; font-size: .84rem; }

        /* ── Progress ──────────────────────────────────────────── */
        .progress-bar { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: width .3s; border-radius: 4px; }
        .log-entry { padding: .25rem 0; font-size: .85rem; color: var(--muted); border-bottom: 1px solid #f1f5f9; }
        .log-entry.phase { font-weight: 600; color: var(--text); }

        /* ── Course card ───────────────────────────────────────── */
        .course-card {
            padding: 1rem 1.25rem; border: 1px solid var(--border); border-radius: 8px;
            cursor: pointer; transition: all .15s; margin-bottom: .5rem;
        }
        .course-card:hover { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
        .course-card.selected { border-color: var(--primary); background: #eff6ff; }
        .course-card h3 { font-size: 1rem; font-weight: 600; margin: 0 0 .15rem 0; }
        .course-card p { font-size: .82rem; color: var(--muted); margin: 0; }

        /* ── Check / Fix ───────────────────────────────────────── */
        .fix-item { padding: .75rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: .5rem; }
        .fix-item label { display: flex; align-items: flex-start; gap: .5rem; font-weight: 400; cursor: pointer; margin: 0; }
        .fix-item input[type="checkbox"] { margin-top: .2rem; }

        /* ── Tabs ──────────────────────────────────────────────── */
        .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; }
        .tab-btn {
            padding: .6rem 1.25rem; font-weight: 600; font-size: .88rem;
            border: none; background: transparent; color: var(--muted);
            cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px;
        }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-btn:hover { color: var(--text); }

        /* ── Misc ──────────────────────────────────────────────── */
        .flex { display: flex; }
        .gap-1 { gap: .5rem; }
        .gap-2 { gap: 1rem; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .flex-wrap { flex-wrap: wrap; }
        .mt-1 { margin-top: .5rem; }
        .mt-2 { margin-top: 1rem; }
        .mb-1 { margin-bottom: .5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .text-success { color: var(--pass); }
        .text-danger { color: var(--fail); }
        .text-muted { color: var(--muted); }
        .text-sm { font-size: .85rem; }

        /* ── Spinner ───────────────────────────────────────────── */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 1.25rem; height: 1.25rem; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; }

        .hidden { display: none; }

        /* ── Login card ──────────────────────────────────────── */
        .login-card {
            max-width: 400px; margin: 4rem auto;
            background: var(--card); border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.1);
            padding: 2rem 2.5rem;
        }
        .login-card h1 { text-align: center; font-size: 1.5rem; margin-bottom: .25rem; }
        .login-card p { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }

        /* ── Responsive ────────────────────────────────────────── */
        @media (max-width: 768px) {
            .container { padding: 1rem .5rem; }
            .card { padding: 1rem; }
            .score-gauge { width: 110px; height: 110px; }
            .score-gauge .val { font-size: 1.75rem; }
            .login-card { margin: 2rem 1rem; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container" x-data="auditApp()" x-init="init()">

        <!-- ═══════════════ Login Screen ═══════════════ -->
        <template x-if="showLogin">
            <div class="login-card">
                <h1>Accessiflow</h1>
                <p>Canvas LMS accessibility auditor</p>

                <label for="login-email">Email</label>
                <input id="login-email" type="email" x-model="loginEmail" placeholder="admin@localhost" @keydown.enter="login()">

                <label for="login-password">Password</label>
                <input id="login-password" type="password" x-model="loginPassword" placeholder="Password" @keydown.enter="login()">

                <button class="btn btn-primary" style="width:100%;justify-content:center;" @click="login()" :disabled="loginLoading || !loginEmail || !loginPassword">
                    <span x-show="loginLoading" class="spinner"></span>
                    <span x-text="loginLoading ? 'Signing in...' : 'Sign In'"></span>
                </button>

                <span x-show="loginError" class="text-danger text-sm mt-1" style="display:block;text-align:center;" x-text="loginError"></span>

                <template x-if="authMode === 'sso'">
                    <div style="text-align:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);">
                        <button class="btn btn-outline" style="width:100%;justify-content:center;" @click="ssoLogin()">
                            Sign in with SSO
                        </button>
                    </div>
                </template>
            </div>
        </template>

        <!-- ═══════════════ Change Password Screen ═══════════════ -->
        <template x-if="showChangePassword">
            <div class="login-card">
                <h1>Change Password</h1>
                <p>You must change your password before continuing.</p>

                <label for="cp-current">Current Password</label>
                <input id="cp-current" type="password" x-model="cpCurrentPassword">

                <label for="cp-new">New Password</label>
                <input id="cp-new" type="password" x-model="cpNewPassword" @keydown.enter="changePassword()">

                <button class="btn btn-primary" style="width:100%;justify-content:center;" @click="changePassword()" :disabled="!cpCurrentPassword || !cpNewPassword">
                    Change Password
                </button>

                <span x-show="cpError" class="text-danger text-sm mt-1" style="display:block;text-align:center;" x-text="cpError"></span>
            </div>
        </template>

        <!-- ═══════════════ Main App ═══════════════ -->
        <template x-if="!showLogin && !showChangePassword">
            <div>
                <!-- Header -->
                <div class="flex items-center justify-between mb-2" style="flex-wrap:wrap;gap:1rem;">
                    <div>
                        <h1 style="font-size:1.5rem;font-weight:700;margin:0;">Accessiflow</h1>
                        <p class="text-muted text-sm">Canvas LMS accessibility auditor — WCAG 2.1 AA &amp; Section 508</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <span x-show="displayName" class="text-sm text-muted">
                            <strong x-text="displayName"></strong>
                            <template x-if="authUser">
                                <span class="role-badge" :class="'role-' + authUser.role" x-text="authUser.role"></span>
                            </template>
                        </span>
                        <button x-show="isAdmin" class="btn btn-ghost btn-sm" @click="showAdmin = !showAdmin" x-text="showAdmin ? 'Back to App' : 'Admin'"></button>
                        <button x-show="authMode !== 'none'" class="btn btn-ghost btn-sm" @click="logout()">Logout</button>
                    </div>
                </div>

                <!-- ═══════════════ Admin Panel ═══════════════ -->
                <template x-if="showAdmin">
                    <div x-data="adminApp()" x-init="init()">
                        <div class="tabs">
                            <button class="tab-btn" :class="{ active: tab === 'users' }" @click="tab = 'users'; loadUsers()">Users</button>
                            <button class="tab-btn" :class="{ active: tab === 'audit' }" @click="tab = 'audit'; loadAuditLogs()">Audit Logs</button>
                            <button class="tab-btn" :class="{ active: tab === 'settings' }" @click="tab = 'settings'; loadSettings()">Settings</button>
                        </div>

                        <!-- Users Tab -->
                        <div x-show="tab === 'users'" class="card">
                            <div class="flex items-center justify-between mb-2">
                                <h2 style="font-size:1.15rem;margin:0;">Users</h2>
                                <button class="btn btn-primary btn-sm" @click="showUserForm = !showUserForm">
                                    <span x-text="showUserForm ? 'Cancel' : 'New User'"></span>
                                </button>
                            </div>

                            <!-- New user form -->
                            <div x-show="showUserForm" class="card" style="background:#f8fafc;margin-bottom:1rem;">
                                <label>Email</label>
                                <input type="email" x-model="userForm.email">
                                <label>Display Name</label>
                                <input type="text" x-model="userForm.display_name">
                                <label>Role</label>
                                <select x-model="userForm.role">
                                    <option value="admin">Admin</option>
                                    <option value="auditor">Auditor</option>
                                    <option value="viewer">Viewer</option>
                                </select>
                                <label>Password (optional for SSO users)</label>
                                <input type="password" x-model="userForm.password">
                                <button class="btn btn-success btn-sm" @click="createUser()">Create User</button>
                            </div>

                            <div x-show="loading" class="flex items-center gap-1 text-muted"><span class="spinner"></span> Loading...</div>

                            <table class="tbl" x-show="users.length">
                                <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead>
                                <tbody>
                                    <template x-for="u in users" :key="u.id">
                                        <tr>
                                            <td x-text="u.email"></td>
                                            <td x-text="u.display_name"></td>
                                            <td>
                                                <select :value="u.role" @change="changeUserRole(u.id, $event.target.value)" style="width:auto;padding:.2rem .5rem;margin:0;font-size:.82rem;">
                                                    <option value="admin">admin</option>
                                                    <option value="auditor">auditor</option>
                                                    <option value="viewer">viewer</option>
                                                </select>
                                            </td>
                                            <td>
                                                <span :class="u.is_active ? 'text-success' : 'text-danger'" x-text="u.is_active ? 'Active' : 'Inactive'" style="font-weight:600;font-size:.82rem;"></span>
                                            </td>
                                            <td class="text-sm text-muted" x-text="formatDate(u.last_login_at)"></td>
                                            <td>
                                                <button class="btn btn-outline btn-sm" @click="toggleUserActive(u.id, u.is_active)" x-text="u.is_active ? 'Disable' : 'Enable'"></button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <!-- Audit Logs Tab -->
                        <div x-show="tab === 'audit'" class="card">
                            <h2 style="font-size:1.15rem;margin-bottom:1rem;">Audit Logs</h2>
                            <div class="flex items-center gap-1 mb-2" style="flex-wrap:wrap;">
                                <input type="text" x-model="auditFilter.action" placeholder="Filter by action..." style="width:auto;margin:0;">
                                <button class="btn btn-outline btn-sm" @click="loadAuditLogs()">Search</button>
                                <span class="text-muted text-sm" x-text="auditTotal + ' total entries'"></span>
                            </div>

                            <div x-show="loading" class="flex items-center gap-1 text-muted"><span class="spinner"></span> Loading...</div>

                            <div style="overflow-x:auto;">
                                <table class="tbl" x-show="auditLogs.length">
                                    <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Resource</th><th>Status</th><th>Detail</th></tr></thead>
                                    <tbody>
                                        <template x-for="log in auditLogs" :key="log.id">
                                            <tr>
                                                <td class="text-sm mono" x-text="formatDate(log.timestamp)"></td>
                                                <td class="text-sm" x-text="log.user_email || '—'"></td>
                                                <td><span class="sev" style="background:#e0e7ff;color:#3730a3;" x-text="log.action"></span></td>
                                                <td class="text-sm" x-text="log.resource_type ? log.resource_type + ':' + (log.resource_id || '') : '—'"></td>
                                                <td>
                                                    <span :class="log.status === 'success' ? 'text-success' : 'text-danger'" x-text="log.status" style="font-weight:600;font-size:.82rem;"></span>
                                                </td>
                                                <td class="mono text-sm" style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" x-text="log.detail || '—'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Settings Tab -->
                        <div x-show="tab === 'settings'" class="card">
                            <h2 style="font-size:1.15rem;margin-bottom:1rem;">App Settings</h2>

                            <div class="card" style="background:#f8fafc;margin-bottom:1rem;">
                                <div class="flex items-center gap-1" style="flex-wrap:wrap;">
                                    <input type="text" x-model="settingForm.key" placeholder="Key" style="width:auto;margin:0;">
                                    <input type="text" x-model="settingForm.value" placeholder="Value" style="width:auto;margin:0;flex:1;">
                                    <button class="btn btn-primary btn-sm" @click="saveSetting()">Save</button>
                                </div>
                            </div>

                            <table class="tbl" x-show="settings.length">
                                <thead><tr><th>Key</th><th>Value</th><th>Updated</th></tr></thead>
                                <tbody>
                                    <template x-for="s in settings" :key="s.key">
                                        <tr>
                                            <td class="mono" x-text="s.key"></td>
                                            <td x-text="s.value"></td>
                                            <td class="text-sm text-muted" x-text="formatDate(s.updated_at)"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                            <p x-show="!settings.length" class="text-muted text-sm">No settings configured yet.</p>
                        </div>
                    </div>
                </template>

                <!-- ═══════════════ Audit Wizard (existing) ═══════════════ -->
                <template x-if="!showAdmin">
                    <div>
                        <!-- Step Indicators -->
                        <div class="steps">
                            <template x-for="(s, i) in stepLabels" :key="i">
                                <span class="step-pill"
                                      :class="{ 'active': step === i+1, 'done': step > i+1 }"
                                      x-text="(i+1) + '. ' + s"></span>
                            </template>
                        </div>

                        <!-- ═══════════════ Step 1: Configure ═══════════════ -->
                        <div x-show="step === 1" class="card">
                            <h2 style="font-size:1.15rem;margin-bottom:1rem;">Connect to Canvas</h2>

                            <label for="canvas-url">Canvas URL</label>
                            <input id="canvas-url" type="url" x-model="canvasUrl" placeholder="https://canvas.jccc.edu">

                            <label for="api-token">Canvas API Token</label>
                            <input id="api-token" type="password" x-model="apiToken" placeholder="Your Canvas API access token">

                            <div class="flex items-center gap-2 mt-1">
                                <button class="btn btn-primary" @click="connect()" :disabled="connecting || !apiToken">
                                    <span x-show="connecting" class="spinner"></span>
                                    <span x-text="connecting ? 'Connecting...' : 'Connect'"></span>
                                </button>
                                <span x-show="configError" class="text-danger text-sm" x-text="configError"></span>
                                <span x-show="validated" class="text-success text-sm">Connected</span>
                            </div>

                            <!-- AI Provider (Optional) -->
                            <details style="margin-top:1.5rem;border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;" x-show="validated">
                                <summary style="cursor:pointer;font-weight:600;font-size:.95rem;">AI Provider (Optional)</summary>
                                <div style="margin-top:1rem;">
                                    <label for="ai-provider">AI Provider</label>
                                    <select id="ai-provider" x-model="aiProvider">
                                        <option value="">None — skip AI features</option>
                                        <option value="anthropic">Anthropic (Claude)</option>
                                        <option value="openai">OpenAI (GPT-4o)</option>
                                        <option value="google">Google (Gemini)</option>
                                        <option value="grok">Grok (xAI)</option>
                                    </select>

                                    <template x-if="aiProvider">
                                        <div>
                                            <label for="ai-key">API Key</label>
                                            <input id="ai-key" type="password" x-model="aiApiKey" placeholder="Your API key (stored locally, never sent to our servers)">

                                            <label for="ai-model">Model (optional override)</label>
                                            <input id="ai-model" type="text" x-model="aiModel" placeholder="Leave blank for default">

                                            <div class="flex items-center gap-2 mt-1">
                                                <button class="btn btn-outline" @click="validateAI()" :disabled="!aiApiKey || aiValidating">
                                                    <span x-show="aiValidating" class="spinner"></span>
                                                    <span x-text="aiValidating ? 'Validating...' : 'Validate Key'"></span>
                                                </button>
                                                <span x-show="aiValidated" class="text-success text-sm">Key validated</span>
                                                <span x-show="aiError" class="text-danger text-sm" x-text="aiError"></span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </details>
                        </div>

                        <!-- ═══════════════ Step 2: Select Course ═══════════════ -->
                        <div x-show="step === 2" class="card">
                            <div class="flex items-center justify-between mb-1">
                                <h2 style="font-size:1.15rem;margin:0;">Select a Course</h2>
                                <button class="btn btn-outline" @click="step = 1">Back</button>
                            </div>

                            <input type="search" x-model="courseFilter" placeholder="Search courses..." style="margin-bottom:.75rem;">

                            <div x-show="loadingCourses" class="flex items-center gap-2 text-muted">
                                <span class="spinner"></span> Loading courses...
                            </div>

                            <template x-for="c in filteredCourses()" :key="c.id">
                                <div class="course-card" :class="{ 'selected': selectedCourse?.id === c.id }" @click="selectedCourse = c">
                                    <h3 x-text="c.name"></h3>
                                    <p><span x-text="c.course_code"></span> <span x-show="c.term" x-text="' — ' + c.term"></span></p>
                                </div>
                            </template>

                            <div x-show="selectedCourse && courseMeta" class="card" style="margin-top:1rem;background:#f8fafc;">
                                <h3 style="font-size:.95rem;margin-bottom:.5rem;">Course Details</h3>
                                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.25rem .5rem;font-size:.88rem;">
                                    <span class="text-muted">Instructor:</span><span x-text="courseMeta?.instructor_name || '—'"></span>
                                    <span class="text-muted">Term:</span><span x-text="courseMeta?.term_name || '—'"></span>
                                    <span class="text-muted">Enrollment:</span><span x-text="(courseMeta?.enrollment_count || 0) + ' students'"></span>
                                    <span class="text-muted">Course Code:</span><span x-text="courseMeta?.course_code || '—'"></span>
                                </div>
                            </div>

                            <div class="mt-2" x-show="selectedCourse">
                                <button class="btn btn-primary" @click="startAudit()" :disabled="!canAudit">
                                    Audit <span x-text="selectedCourse?.name"></span>
                                </button>
                                <span x-show="!canAudit" class="text-muted text-sm">Viewer role cannot start audits</span>
                            </div>
                        </div>

                        <!-- ═══════════════ Step 3: Audit Running ═══════════════ -->
                        <div x-show="step === 3" class="card">
                            <h2 style="font-size:1.15rem;margin-bottom:1rem;">Audit in Progress</h2>

                            <div class="progress-bar mb-1">
                                <div class="progress-fill" :style="'width:' + progressPct + '%'"></div>
                            </div>
                            <p class="text-sm text-muted mb-2" x-text="currentPhaseLabel || 'Starting...'"></p>

                            <div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;">
                                <template x-for="(entry, i) in progressLog" :key="i">
                                    <div class="log-entry" :class="{ 'phase': entry.type === 'phase' }">
                                        <span x-text="formatLogEntry(entry)"></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- ═══════════════ Step 4: Results Dashboard ═══════════════ -->
                        <div x-show="step === 4">
                            <div class="card">
                                <div class="flex items-center gap-2" style="flex-wrap:wrap;">
                                    <div style="flex:1;min-width:280px;">
                                        <h2 style="font-size:1.15rem;margin-bottom:.25rem;">Audit Results</h2>
                                        <p class="text-muted text-sm" x-text="result?.course_name + ' — Course ID ' + result?.course_id"></p>
                                        <p class="mt-1">
                                            <span x-show="result?.overall_score >= 90" class="sev" style="background:#dcfce7;color:#166534;">PASSING</span>
                                            <span x-show="result?.overall_score < 90" class="sev" style="background:#fee2e2;color:#991b1b;">NEEDS WORK</span>
                                        </p>
                                    </div>
                                    <div class="score-gauge" :class="scoreClass(result?.overall_score)"
                                         :aria-label="'Overall score: ' + (result?.overall_score?.toFixed(1) || 0) + ' percent'"
                                         role="img">
                                        <span class="val" x-text="(result?.overall_score?.toFixed(1) || '0.0') + '%'"></span>
                                        <span class="lbl">Overall</span>
                                    </div>
                                </div>
                            </div>

                            <div class="card">
                                <h2 style="font-size:1.05rem;margin-bottom:.5rem;">Summary</h2>
                                <div class="stats-grid">
                                    <div class="stat-box"><div class="sv" x-text="result?.total_issues || 0"></div><div class="sl">Total Issues</div></div>
                                    <div class="stat-box"><div class="sv" style="color:#991b1b" x-text="result?.critical_count || 0"></div><div class="sl">Critical</div></div>
                                    <div class="stat-box"><div class="sv" style="color:#9a3412" x-text="result?.serious_count || 0"></div><div class="sl">Serious</div></div>
                                    <div class="stat-box"><div class="sv" style="color:#854d0e" x-text="result?.moderate_count || 0"></div><div class="sl">Moderate</div></div>
                                    <div class="stat-box"><div class="sv" style="color:#4b5563" x-text="result?.minor_count || 0"></div><div class="sl">Minor</div></div>
                                    <div class="stat-box"><div class="sv" style="color:var(--pass)" x-text="result?.items_passing || 0"></div><div class="sl">Passing</div></div>
                                    <div class="stat-box"><div class="sv" style="color:var(--fail)" x-text="result?.items_failing || 0"></div><div class="sl">Failing</div></div>
                                </div>
                            </div>

                            <div class="card" x-show="result?.content_items?.length">
                                <h2 style="font-size:1.05rem;margin-bottom:.5rem;">Content Items</h2>
                                <div style="overflow-x:auto;">
                                    <table class="tbl">
                                        <thead><tr><th>Type</th><th>Title</th><th class="tr">Score</th><th class="tr">Issues</th></tr></thead>
                                        <tbody>
                                            <template x-for="item in sortedContent()" :key="item.id">
                                                <tr>
                                                    <td x-text="item.content_type"></td>
                                                    <td><a :href="item.url" target="_blank" rel="noopener" x-text="item.title"></a></td>
                                                    <td class="tr"><span class="score-pill" :class="scoreClass(item.score)" x-text="item.score != null ? item.score.toFixed(1) + '%' : '—'"></span></td>
                                                    <td class="tr" x-text="item.issues.length"></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="card" x-show="result?.file_items?.length">
                                <h2 style="font-size:1.05rem;margin-bottom:.5rem;">File Items</h2>
                                <div style="overflow-x:auto;">
                                    <table class="tbl">
                                        <thead><tr><th>File</th><th>Type</th><th class="tr">Size</th><th class="tr">Score</th><th class="tr">Issues</th></tr></thead>
                                        <tbody>
                                            <template x-for="item in sortedFiles()" :key="item.id">
                                                <tr>
                                                    <td x-text="item.display_name"></td>
                                                    <td class="mono" x-text="item.content_type_header"></td>
                                                    <td class="tr mono" x-text="(item.size / 1024).toFixed(1) + ' KB'"></td>
                                                    <td class="tr"><span class="score-pill" :class="scoreClass(item.score)" x-text="item.score != null ? item.score.toFixed(1) + '%' : '—'"></span></td>
                                                    <td class="tr" x-text="item.issues.length"></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="card" x-show="allIssues().length">
                                <h2 style="font-size:1.05rem;margin-bottom:.5rem;">Issues Detail</h2>
                                <p class="text-muted text-sm mb-1" x-text="allIssues().length + ' issue' + (allIssues().length !== 1 ? 's' : '') + ' found, ordered by severity.'"></p>
                                <div style="overflow-x:auto;">
                                    <table class="tbl">
                                        <thead><tr><th>Severity</th><th>Check</th><th>Item</th><th>WCAG</th><th>Standards</th><th>Description</th><th class="tc">Actions</th></tr></thead>
                                        <tbody>
                                            <template x-for="(iss, idx) in allIssues()" :key="idx">
                                                <tr>
                                                    <td><span class="sev" :class="'sev-' + iss.severity" x-text="iss.severity"></span></td>
                                                    <td class="mono" x-text="iss.check_id"></td>
                                                    <td x-text="iss._itemName" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></td>
                                                    <td><a class="text-sm" style="color:var(--primary);" :href="'https://www.w3.org/WAI/WCAG21/Understanding/' + iss.wcag_criterion.replaceAll('.', '')" target="_blank" rel="noopener" x-text="iss.wcag_criterion"></a></td>
                                                    <td class="text-sm">
                                                        <span x-show="getStandards(iss)" x-text="getStandards(iss)"></span>
                                                    </td>
                                                    <td>
                                                        <span x-text="iss.title"></span>
                                                        <code x-show="iss.element_html" class="mono text-sm" style="display:block;max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#334155;background:#f8fafc;padding:.15em .4em;border-radius:3px;margin-top:.2rem;" x-text="iss.element_html?.substring(0, 120)"></code>
                                                    </td>
                                                    <td class="tc">
                                                        <span x-show="iss.fixed" title="Fixed">&#10004;</span>
                                                        <span x-show="!iss.fixed && iss.auto_fixable" title="Auto-fixable">&#9881;</span>
                                                        <span x-show="!iss.fixed && !iss.auto_fixable && iss.ai_fixable" title="AI-fixable">&#9733;</span>
                                                        <span x-show="!iss.fixed && !iss.auto_fixable && !iss.ai_fixable" title="Manual">—</span>
                                                        <button x-show="aiValidated && !iss.fixed" class="btn btn-outline" style="padding:.2em .5em;font-size:.72rem;" @click="getAISuggestion(idx)" :disabled="iss._aiLoading">
                                                            AI
                                                        </button>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="card flex items-center gap-2" style="flex-wrap:wrap;">
                                <button class="btn btn-primary" @click="step = 5" x-show="hasFixableIssues() && canAudit">Fix Issues</button>
                                <button class="btn btn-outline" @click="step = 6">Download Reports</button>
                            </div>
                        </div>

                        <!-- ═══════════════ Step 5: Fix & Remediate ═══════════════ -->
                        <div x-show="step === 5" class="card">
                            <div class="flex items-center justify-between mb-1">
                                <h2 style="font-size:1.15rem;margin:0;">Fix & Remediate</h2>
                                <button class="btn btn-outline" @click="step = 4">Back to Results</button>
                            </div>

                            <p class="text-muted text-sm mb-2" x-text="fixableIssues().length + ' auto-fixable issue' + (fixableIssues().length !== 1 ? 's' : '')"></p>

                            <template x-for="(iss, idx) in fixableIssues()" :key="idx">
                                <div class="fix-item">
                                    <label>
                                        <input type="checkbox" :value="idx" x-model="selectedFixes">
                                        <div>
                                            <span class="sev" :class="'sev-' + iss.severity" x-text="iss.severity"></span>
                                            <strong x-text="iss.check_id"></strong> in <em x-text="iss._itemName"></em>
                                            <p class="text-sm text-muted" x-text="iss.title"></p>
                                        </div>
                                    </label>
                                </div>
                            </template>

                            <div class="mt-2 flex items-center gap-2" style="flex-wrap:wrap;">
                                <label style="font-weight:400;font-size:.88rem;display:flex;align-items:center;gap:.4rem;margin:0;">
                                    <input type="checkbox" x-model="pushToCanvas"> Push fixes to Canvas
                                </label>
                            </div>

                            <div class="mt-2 flex items-center gap-2" style="flex-wrap:wrap;">
                                <button class="btn btn-success" @click="applyFixes()" :disabled="fixing || selectedFixes.length === 0">
                                    <span x-show="fixing" class="spinner"></span>
                                    <span x-text="fixing ? 'Applying...' : 'Apply Selected (' + selectedFixes.length + ')'"></span>
                                </button>
                                <button class="btn btn-outline" @click="selectedFixes = fixableIssues().map((_, i) => String(i))">Select All</button>
                                <button class="btn btn-outline" @click="selectedFixes = []">Deselect All</button>
                            </div>

                            <div x-show="fixResult" class="mt-2">
                                <p class="text-success" x-show="fixResult?.fixed_count">
                                    Fixed <span x-text="fixResult?.fixed_count"></span> issues. New score: <strong x-text="fixResult?.new_score?.toFixed(1) + '%'"></strong>
                                </p>
                                <template x-for="err in (fixResult?.errors || [])" :key="err">
                                    <p class="text-danger text-sm" x-text="err"></p>
                                </template>
                            </div>
                        </div>

                        <!-- ═══════════════ Step 6: Reports ═══════════════ -->
                        <div x-show="step === 6" class="card">
                            <div class="flex items-center justify-between mb-1">
                                <h2 style="font-size:1.15rem;margin:0;">Download Reports</h2>
                                <button class="btn btn-outline" @click="step = 4">Back to Results</button>
                            </div>

                            <p class="text-muted text-sm mb-2">Download the audit results in your preferred format.</p>

                            <div class="flex gap-2" style="flex-wrap:wrap;">
                                <a class="btn btn-primary" :href="'/api/report/' + jobId + '/html'" download>Download HTML Report</a>
                                <a class="btn btn-outline" :href="'/api/report/' + jobId + '/json'" download>Download JSON Report</a>
                                <a class="btn btn-outline" :href="'/api/report/' + jobId + '/vpat'" download>Download VPAT Report</a>
                            </div>

                            <div class="mt-2">
                                <button class="btn btn-outline" @click="resetAll()">Start New Audit</button>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Footer -->
                <footer style="text-align:center;color:var(--muted);font-size:.78rem;padding:1.5rem 0;border-top:1px solid var(--border);margin-top:1rem;">
                    <p>Built with <strong>Accessiflow</strong> v2.0 — Canvas LMS accessibility auditor</p>
                    <p>Open source under AGPL-3.0 License</p>
                </footer>
            </div>
        </template>
    </div>

    <script src="/static/app.js"></script>
    <script src="/static/admin.js"></script>
</body>
</html>
